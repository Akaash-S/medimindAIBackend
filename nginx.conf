# ─────────────────────────────────────────────────────────────────────────────
# MediMind AI — Nginx Gateway Configuration
# Handles: HTTP→HTTPS redirect, CORS, reverse proxy to FastAPI (internal)
# ─────────────────────────────────────────────────────────────────────────────

# Allowed origins map — add every frontend origin here (no trailing slash)
map $http_origin $cors_origin {
    default                         "";
    "http://localhost:5173"         $http_origin;
    "http://localhost:8080"         $http_origin;
    # ↓ Replace with your real frontend domain(s)
    "https://aimedimind.vercel.app" $http_origin;
    # "https://your-custom-domain.com" $http_origin;
}

# ── 1. HTTP → HTTPS permanent redirect (301) ─────────────────────────────────
server {
    listen 80;
    server_name _;   # Replace _ with your domain once you have one

    # Let's Encrypt ACME challenge must go through on HTTP (not redirected)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else: 301 Moved Permanently → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── 2. HTTPS — CORS gateway + reverse proxy ───────────────────────────────────
server {
    listen 443 ssl;
    server_name _;   # Replace _ with your domain once you have one

    # ── SSL certificates (mounted from certs/ via docker-compose volume) ──────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Modern SSL settings
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    # HSTS — tells browsers to only use HTTPS for 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Upload limits (medical reports / PDFs can be large) ──────────────────
    client_max_body_size 25M;

    # ── General security headers ──────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"               always;
    add_header X-XSS-Protection       "1; mode=block"         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    # Must be unsafe-none so that Google Sign-In popup can post back to the
    # opener window (window.closed / postMessage). A stricter value silently
    # breaks Firebase signInWithPopup and causes COOP warnings in the console.
    add_header Cross-Origin-Opener-Policy "unsafe-none" always;

    # ── CORS handled entirely by Nginx ────────────────────────────────────────
    # Preflight (OPTIONS) — respond immediately without hitting FastAPI
    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Credentials "true"       always;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With, Origin, Cache-Control, Pragma" always;
            add_header Access-Control-Max-Age           86400        always;
            add_header Content-Type                     "text/plain; charset=utf-8" always;
            add_header Content-Length                   0            always;
            return 204;
        }

        # CORS headers on every real response
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials "true"       always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With, Origin, Cache-Control, Pragma" always;

        # ── Reverse proxy to FastAPI container ────────────────────────────────
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Timeouts (generous for AI / report processing requests)
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;

        # Buffer tuning
        proxy_buffering   on;
        proxy_buffer_size 16k;
        proxy_buffers     8 16k;
    }

    # ── Health check (no CORS / access logging needed) ───────────────────────
    location /api/v1/health {
        proxy_pass         http://backend:8000/api/v1/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log off;
    }
}
