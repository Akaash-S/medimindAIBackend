# ─────────────────────────────────────────────────────────────────────────────
# MediMind AI — Nginx Gateway Configuration
# Handles: public traffic, CORS, reverse proxy to FastAPI (internal container)
# ─────────────────────────────────────────────────────────────────────────────

# Allowed origins map — add every frontend origin here (no trailing slash)
map $http_origin $cors_origin {
    default                         "";
    "http://localhost:5173"         $http_origin;
    "http://localhost:8080"         $http_origin;
    # ↓ Replace with your real frontend domain(s)
    "https://medimindai.vercel.app" $http_origin;
    # "https://your-custom-domain.com" $http_origin;
}

server {
    listen 80;
    server_name _;  # catches any hostname / bare IP; replace with domain if you have one

    # ── Upload limits (medical reports / PDFs can be large) ──────────────────
    client_max_body_size 25M;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── CORS handled entirely by Nginx ────────────────────────────────────────
    # Preflight (OPTIONS) — respond immediately without hitting FastAPI
    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Credentials "true"       always;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With, Origin" always;
            add_header Access-Control-Max-Age           86400        always;
            add_header Content-Type                     "text/plain; charset=utf-8" always;
            add_header Content-Length                   0            always;
            return 204;
        }

        # CORS headers on every real response
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials "true"       always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With, Origin" always;

        # ── Reverse proxy to FastAPI container ────────────────────────────────
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Timeouts (generous for AI / report processing requests)
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;

        # Buffer tuning
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;
    }

    # ── Health check endpoint (bypass CORS for internal monitoring) ───────────
    location /api/v1/health {
        proxy_pass         http://backend:8000/api/v1/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log off;
    }
}
